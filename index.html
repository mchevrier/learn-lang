            <rect x="26" width="8" height="36" fill="#cf142b"/>

      </span>
      <span class="brand-text">
        <span class="brand-name">Matilda</span>
        <span class="brand-tag">English&nbsp;4&nbsp;fun!</span>
      </span>
    </a>
    <button id="back-btn" class="back-btn" hidden>← Exercises</button>

  <main id="app" class="app">
